name: Agent failure case
description: Share a case where a coding agent needed better repo context
title: "Agent failure: [Short Summary]"
labels: ["agent-failure", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an agent failure case! Sharing these cases helps us refine the Harness rules and build more resilient workflows.

  - type: textarea
    id: request
    attributes:
      label: What did you ask the agent to do?
      description: Provide the exact prompt or a clear description of the instruction you gave the agent.
      placeholder: e.g., "Add an authentication gate to the global release server script"
    validations:
      required: true

  - type: textarea
    id: failure
    attributes:
      label: What went wrong?
      description: Describe the exact error, hallucination, or logic failure that occurred. Include any relevant logs or outputs if possible.
      placeholder: e.g., "The agent repeatedly edited the wrong file and failed to verify that cargo build was successful"
    validations:
      required: true

  - type: textarea
    id: missing_context
    attributes:
      label: What context was missing from the repo?
      description: What information, instructions, or rules would have guided the agent to success?
      placeholder: e.g., "The agent didn't know about the custom Cargo configuration in harness.toml"
    validations:
      required: true

  - type: checkboxes
    id: helpful_artifacts
    attributes:
      label: Which harness artifact could help prevent this?
      description: Select any existing or potential harness documents that could have provided the missing context.
      options:
        - label: AGENTS.md
        - label: Product contract (docs/product/*)
        - label: Story packet (docs/stories/*)
        - label: Validation matrix (harness query matrix)
        - label: Architecture notes (docs/ARCHITECTURE.md)
        - label: Decision record (docs/decisions/*)
        - label: Templates (docs/templates/*)
        - label: Other / New artifact
    validations:
      required: false

  - type: dropdown
    id: tool
    attributes:
      label: Tool used
      description: Select the coding agent or tool that encountered the failure.
      options:
        - Claude Code
        - Codex
        - Cursor
        - Windsurf
        - GitHub Copilot
        - Antigravity
        - Other
    validations:
      required: true

  - type: textarea
    id: suggested_improvement
    attributes:
      label: Suggested improvement
      description: How should the Harness or repository be improved to guide future agents?
      placeholder: e.g., "We should add a rule to AGENTS.md forcing the agent to run cargo check before editing scripts."
    validations:
      required: false
