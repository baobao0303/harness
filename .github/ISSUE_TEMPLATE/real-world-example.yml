name: Real-world harness example
description: Share how you used or adapted the harness in a project
title: "Example: [Short Description]"
labels: ["example", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        We are thrilled that you are using Harness! Sharing your practical experience, configurations, and workflows helps make Harness better for everyone.

  - type: textarea
    id: project_type
    attributes:
      label: Project type
      description: Describe the project type, domain, and general tech stack.
      placeholder: e.g., "Fullstack React/Node.js web app deployed on AWS"
    validations:
      required: true

  - type: textarea
    id: installation_adaptations
    attributes:
      label: How did you install or adapt the harness?
      description: Did you use the global installer, use a local entrypoint, customize risk classifications, or alter rules?
      placeholder: e.g., "Installed via the global installer, tweaked the feature intake checklist to include AWS CDK specific flags"
    validations:
      required: true

  - type: checkboxes
    id: key_files
    attributes:
      label: Which files mattered most?
      description: Select the Harness files/templates that were most valuable or required the most updates.
      options:
        - label: AGENTS.md
        - label: docs/HARNESS.md
        - label: docs/FEATURE_INTAKE.md
        - label: docs/TEST_MATRIX.md
        - label: docs/templates/*
        - label: scripts/harness CLI
        - label: harness.db (Durable operational SQLite DB)
        - label: Other
    validations:
      required: false

  - type: dropdown
    id: tool_used
    attributes:
      label: Which agent/tool did you use?
      description: Select the primary AI coding companion used for this project.
      options:
        - Claude Code
        - Codex
        - Cursor
        - Windsurf
        - GitHub Copilot
        - Antigravity
        - Other
    validations:
      required: true

  - type: textarea
    id: success_story
    attributes:
      label: What worked well?
      description: Share your wins, how the harness helped guide the agent, prevent mistakes, or save time.
      placeholder: e.g., "The risk checklist completely stopped the agent from accidentally writing unapproved DB schemas!"
    validations:
      required: true

  - type: textarea
    id: improvement_areas
    attributes:
      label: What should the harness improve?
      description: Mention any friction, confusion, or feature gaps you encountered.
      placeholder: e.g., "The intake script should support automatic classification based on git diffs if possible"
    validations:
      required: false
