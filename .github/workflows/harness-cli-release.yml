name: Harness Release

on:
  push:
    tags:
      - "v*"
      - "harness-v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing or new GitHub Release tag to upload artifacts to"
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.os }}-cargo-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-

      - name: Check code formatting
        run: cargo fmt --check

      - name: Run unit tests
        run: cargo test

      - name: Check shell scripts syntax (Ubuntu only)
        if: matrix.os == 'ubuntu-24.04'
        run: |
          bash -n scripts/install-harness.sh
          bash -n scripts/install-global.sh
          bash -n scripts/harness
          bash -n scripts/build-harness-cli-release.sh

  build:
    name: Build ${{ matrix.platform }}
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            target: aarch64-apple-darwin
            runner: macos-15
          - platform: macos-x64
            target: x86_64-apple-darwin
            runner: macos-15-intel
          - platform: linux-x64
            target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - platform: linux-arm64
            target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.runner }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ matrix.runner }}-${{ matrix.target }}-cargo-

      - name: Build release artifact
        run: scripts/build-harness-cli-release.sh --target "${{ matrix.target }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: harness-${{ matrix.platform }}
          path: |
            dist/harness-${{ matrix.platform }}
            dist/harness-${{ matrix.platform }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || github.event.inputs.release_tag != '' }}
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: harness-*
          merge-multiple: true
          path: dist

      - name: Create release if needed
        run: |
          gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 ||
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$RELEASE_TAG" \
              --notes "Harness release $RELEASE_TAG"

      - name: Upload release assets
        run: gh release upload "$RELEASE_TAG" dist/harness-* --repo "$GITHUB_REPOSITORY" --clobber
